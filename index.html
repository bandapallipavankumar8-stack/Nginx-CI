<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Cloud Center</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a202c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #ffffff;
        }

        .card {
            background: #2d3748;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        /* Home View Trigger */
        .aws-trigger {
            cursor: pointer;
            padding: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            transition: background 0.2s ease;
        }

        .aws-trigger:hover {
            background: #ff9900; /* AWS Orange */
            color: #1a202c;
        }

        h1 { margin: 10px 0; font-size: 32px; }
        p { color: #a0aec0; }
        .aws-trigger:hover p { color: #2d3748; }

        /* Services View (Hidden Initially) */
        .services-list {
            display: none;
            text-align: left;
        }

        .service-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #ff9900;
        }

        .service-item strong { color: #ff9900; display: block; }

        .back-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid #ff9900;
            color: #ff9900;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .back-btn:hover {
            background: #ff9900;
            color: #1a202c;
        }
    </style>
</head>
<body>

    <div class="card">
        
        <!-- VIEW 1: HOME PAGE -->
        <div id="home-view" class="aws-trigger" onclick="showServices()">
            <div style="font-size: 60px;">☁️</div>
            <h1>Amazon Web Services</h1>
            <p>Click here to explore deployed cloud features</p>
        </div>

        <!-- VIEW 2: SERVICES LIST -->
        <div id="services-view" class="services-list">
            <h2 style="color: #ff9900; margin-top: 0;">AWS Core Services</h2>
            
            <div class="service-item"><strong>EC2</strong>Compute virtual machines.</div>
            <div class="service-item"><strong>S3</strong>Object artifact storage.</div>
            <div class="service-item"><strong>VPC</strong>Isolated logical networks.</div>
            <div class="service-item"><strong>IAM</strong>Security access control identities.</div>
            <div class="service-item"><strong>RDS</strong>Managed relational SQL databases.</div>

            <button class="back-btn" onclick="showHome()">⬅ Back</button>
        </div>

    </div>

    <script>
        function showServices() {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('services-view').style.display = 'block';
        }

        function showHome() {
            document.getElementById('services-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
        }
    </script>
</body>
</html>
