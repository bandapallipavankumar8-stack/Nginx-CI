<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Successful</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* ATTRACTIVE: Full-bleed high-resolution technology background image */
            background: url('https://unsplash.com') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            /* ATTRACTIVE: Translucent glass card to make text readable over the image */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 85%;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Hover elevation effect */
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
        }

        .icon-circle {
            background-color: #e8f8f5;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.25);
        }

        .icon {
            font-size: 42px;
            color: #2ecc71;
            font-weight: bold;
        }

        h1 {
            color: #1a252f;
            margin: 0 0 12px 0;
            font-size: 26px;
            font-weight: 700;
        }

        p {
            color: #34495e;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 25px 0;
            font-weight: 500;
        }

        .badge {
            background: linear-gradient(135deg, #1abc9c, #16a085);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(26, 188, 156, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-circle">
            <div class="icon">✓</div>
        </div>
        <h1>Deployment Success!</h1>
        <p>Your sample HTML webpage was packaged via Jenkins and pushed to your AWS S3 bucket in Mumbai.</p>
        <div class="badge">Region: ap-south-1</div>
    </div>

</body>
</html>
