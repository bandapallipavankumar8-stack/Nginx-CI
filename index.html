<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poultry Farm Daily Log Form</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --accent-color: #f9a825;
            --bg-color: #f1f8e9;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            border-top: 8px solid var(--primary-color);
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #455a64;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(46, 125, 50, 0.2);
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
        }

        .radio-label input {
            margin-right: 6px;
            accent-color: var(--primary-color);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #1b5e20;
        }

        @media (max-width: 480px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>🐔 Poultry Farm Log</h2>
    
    <form action="#" method="POST">
        <!-- Date and Shed Selection -->
        <div class="form-row">
            <div class="form-group">
                <label for="log-date">Date *</label>
                <input type="date" id="log-date" name="log_date" required>
            </div>
            <div class="form-group">
                <label for="shed-no">Shed / House Number *</label>
                <select id="shed-no" name="shed_no" required>
                    <option value="" disabled selected>Select Shed</option>
                    <option value="shed-1">Shed A (Broilers)</option>
                    <option value="shed-2">Shed B (Layers)</option>
                    <option value="shed-3">Shed C (Breeders)</option>
                </select>
            </div>
        </div>

        <!-- Bird Type and Flock Count -->
        <div class="form-group">
            <label>Poultry Type *</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="poultry_type" value="broiler" required> Broiler</label>
                <label class="radio-label"><input type="radio" name="poultry_type" value="layer"> Layer</label>
                <label class="radio-label"><input type="radio" name="poultry_type" value="other"> Other</label>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="total-birds">Current Bird Count *</label>
                <input type="number" id="total-birds" name="total_birds" min="0" placeholder="e.g. 5000" required>
            </div>
            <div class="form-group">
                <label for="mortality">Mortality (Today)</label>
                <input type="number" id="mortality" name="mortality" min="0" value="0">
            </div>
        </div>

        <!-- Production and Resources -->
        <div class="form-row">
            <div class="form-group">
                <label for="egg-count">Eggs Collected (Layers)</label>
                <input type="number" id="egg-count" name="egg_count" min="0" placeholder="Total eggs">
            </div>
            <div class="form-group">
                <label for="feed-consumed">Feed Consumed (kg) *</label>
                <input type="number" id="feed-consumed" name="feed_consumed" min="0" step="0.1" placeholder="Weight in kg" required>
            </div>
        </div>

        <!-- Health and Remarks -->
        <div class="form-group">
            <label for="health-status">Flock Health Status</label>
            <select id="health-status" name="health_status">
                <option value="healthy">Excellent / Healthy</option>
                <option value="monitoring">Needs Monitoring</option>
                <option value="sick">Signs of Disease / Sick</option>
            </select>
        </div>

        <div class="form-group">
            <label for="remarks">Daily Remarks & Observations</label>
            <textarea id="remarks" name="remarks" placeholder="Enter vaccinations, behavior observations, or specific needs..."></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit">Submit Daily Log</button>
    </form>
</div>

</body>
</html>
