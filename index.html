<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Successful</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* ATTRACTIVE: Dynamic, moving gradient background */
            background: linear-gradient(-45deg, #22c1c3, #fdbb2d, #1abc9c, #2ecc71);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Smooth background movement animation */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            /* ATTRACTIVE: Modern glassmorphism card effect */
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 400px;
            width: 85%;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Subtle hover pop effect on the card */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .icon-circle {
            background-color: #e8f8f5;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.2);
        }

        .icon {
            font-size: 42px;
            color: #2ecc71;
            font-weight: bold;
        }

        h1 {
            color: #2c3e50;
            margin: 0 0 12px 0;
            font-size: 26px;
            font-weight: 700;
        }

        p {
            color: #5a6c7d;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 25px 0;
        }

        .badge {
            background: linear-gradient(135deg, #1abc9c, #16a085);
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(26, 188, 156, 0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-circle">
            <div class="icon">✓</div>
        </div>
        <h1>Deployment Success!</h1>
        <p>Your sample HTML webpage was packaged via Jenkins and pushed to your AWS S3 bucket in Mumbai.</p>
        <div class="badge">Region: ap-south-1</div>
    </div>

</body>
</html>
