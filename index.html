<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devops Deployments</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* ATTRACTIVE: Full-screen abstract network/DevOps background image */
            background: url('https://unsplash.com') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            margin: 0;
            overflow: hidden;
        }

        .card {
            /* ATTRACTIVE: High-fidelity glassmorphism structure for contrast over the image */
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 45px 35px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 420px;
            width: 85%;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Hover animation dynamics */
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }

        .icon-circle {
            background-color: #e8f8f5;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.3);
        }

        .icon {
            font-size: 46px;
            color: #2ecc71;
            font-weight: bold;
        }

        h1 {
            color: #1a252f;
            margin: 0 0 15px 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            color: #34495e;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 30px 0;
            font-weight: 500;
        }

        .badge {
            background: linear-gradient(135deg, #1abc9c, #16a085);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            display: inline-block;
            letter-spacing: 0.8px;
            box-shadow: 0 6px 15px rgba(26, 188, 156, 0.4);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-circle">
            <div class="icon">✓</div>
        </div>
        <!-- FIXED: Updated with your requested title name -->
        <h1>Devops Deployments</h1>
        <p>Your sample HTML webpage was packaged via Jenkins and pushed to your AWS S3 bucket in Mumbai.</p>
        <div class="badge">Region: ap-south-1</div>
    </div>

</body>
</html>
