<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato/Swiggy Express Clone - KR Puram</title>
    <style>
        :root {
            --primary-color: #cb202d; /* Zomato Red */
            --swiggy-orange: #fc8019; /* Swiggy Orange */
            --text-dark: #1c1c1c;
            --text-gray: #696969;
            --bg-light: #f8f8f8;
            --border-color: #e8e8e8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: var(--text-dark);
        }

        /* Navigation Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .restaurant-logo {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary-color), var(--swiggy-orange));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            font-size: 18px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--primary-color);
        }

        .search-bar {
            flex: 0 1 500px;
            display: flex;
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            background: #fff;
        }

        .search-bar input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .location-badge {
            font-weight: 600;
            cursor: pointer;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            background: var(--bg-light);
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Category Filter Pills */
        .categories {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .category-pill {
            padding: 10px 22px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.2s ease;
            background: white;
            font-weight: 500;
        }

        .category-pill:hover, .category-pill.active {
            background-color: var(--text-dark);
            color: white;
            border-color: var(--text-dark);
        }

        /* Two-Column App Layout */
        .app-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        /* Restaurant & Menu Section */
        .restaurant-header {
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .restaurant-name { font-size: 26px; font-weight: 700; margin: 0; }
        .restaurant-cuisine { color: var(--text-gray); margin: 6px 0 0 0; font-size: 14px; }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .item-details { flex: 1; padding-right: 20px; }
        .item-name { font-size: 18px; font-weight: 600; margin: 0 0 6px 0; }
        .item-price { font-weight: 700; color: #1c1c1c; margin: 0 0 8px 0; font-size: 16px; }
        .item-desc { font-size: 13px; color: var(--text-gray); margin: 0; line-height: 1.4; }

        .item-action {
            position: relative;
            text-align: center;
        }

        .item-img {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 12px;
            background-color: var(--bg-light);
            border: 1px solid var(--border-color);
        }

        .btn-add {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #27ae60;
            border: 1px solid #27ae60;
            padding: 8px 28px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .btn-add:hover {
            background: #f4fff7;
            transform: translateX(-50%) scale(1.03);
        }

        /* Cart Widget Section */
        .cart-box {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .cart-title { font-size: 20px; font-weight: 700; margin: 0 0 15px 0; border-bottom: 2px solid var(--bg-light); padding-bottom: 12px; }
        .cart-items { max-height: 280px; overflow-y: auto; margin-bottom: 15px; }
        
        .cart-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 14px;
        }

        .cart-totals {
            border-top: 1px dashed var(--border-color);
            padding-top: 15px;
            margin-top: 15px;
        }

        .btn-checkout {
            width: 100%;
            background-color: var(--swiggy-orange);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .btn-checkout:hover { background-color: #e16a0e; }

        /* Delivery Tracker Modal Overlay */
        .tracker-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .tracker-card {
            background: white;
            padding: 35px;
            border-radius: 16px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.25);
        }

        .status-step {
            display: flex;
            gap: 18px;
            margin-bottom: 25px;
            position: relative;
        }

        .status-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #bdc3c7;
            margin-top: 3px;
            transition: all 0.3s ease;
        }

        .status-step.active .status-dot { background: #27ae60; box-shadow: 0 0 10px rgba(39,174,96,0.6); }
        .status-step.active .status-text { font-weight: 700; color: #27ae60; }
        .status-text { font-size: 15px; color: #555; }
        
        .btn-close {
            background: #f0f0f0; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; margin-top: 10px;
        }
        .btn-close:hover { background: #e5e5e5; }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="logo-section">
            <!-- Circular Restaurant Logo Slot -->
            <div class="restaurant-logo">FE</div>
            <div class="logo">food<span>express</span></div>
        </div>
        
        <div class="search-bar">
            <input type="text" placeholder="Search for dishes, restaurants or cuisines...">
        </div>

        <!-- Custom Regional Delivery Address Placement -->
        <div class="location-badge">
            <span>📍</span> KR Puram, Bangalore
        </div>
    </header>

    <div class="container">
        <!-- Category Selector Pills -->
        <div class="categories">
            <div class="category-pill active">All Dishes</div>
            <div class="category-pill">Pure Veg</div>
            <div class="category-pill">Biryani Specialist</div>
            <div class="category-pill">North Indian</div>
            <div class="category-pill">Fast Food</div>
        </div>

        <!-- Application Structural Split View Grid -->
        <div class="app-layout">
            
            <!-- Left Grid Pane: Digital Menu Display Layout -->
            <div>
                <div class="restaurant-header">
                    <h1 class="restaurant-name">The Grand Imperial Kitchen</h1>
