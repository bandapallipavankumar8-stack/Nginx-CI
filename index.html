<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Completed</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* ATTRACTIVE: Full-screen beautiful landscape nature background image */
            background: url('https://unsplash.com') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            margin: 0;
            overflow: hidden;
        }

        .card {
            /* ATTRACTIVE: Sleek frost-glass layout so text is easily readable over nature branches */
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 440px;
            width: 85%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .leaf-icon {
            font-size: 55px;
            margin-bottom: 15px;
            display: inline-block;
        }

        h1 {
            color: #2c3e50;
            margin: 0 0 15px 0;
            font-size: 26px;
            font-weight: 800;
            line-height: 1.3;
        }

        p {
            color: #4f5d6c;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 25px 0;
            font-weight: 500;
        }

        .badge {
            background: linear-gradient(135deg, #27ae60, #11998e);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            display: inline-block;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="leaf-icon">🌿</div>
        <!-- FIXED: Updated with your exact requested display title -->
        <h1>Deployment completed for jenkins</h1>
        <p>Your production web static files have been successfully packaged, tracked, and served live from your target environment footprint.</p>
        <div class="badge">STATUS: ACTIVE</div>
    </div>

</body>
</html>
