<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiggy Super Clone - KR Puram</title>
    <style>
        :root {
            --swiggy-orange: #fc8019;
            --text-dark: #282c3f;
            --text-gray: #686b78;
            --bg-light: #f4f4f6;
            --border-color: #e9e9eb;
            --veg-green: #0f8a65;
            --nonveg-red: #e43b4f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: var(--text-dark);
            scroll-behavior: smooth;
        }

        /* Top Navigation Bar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            height: 80px;
            background: #fff;
            box-shadow: 0 15px 40px -20px rgba(40,44,63,.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo-section {
            font-size: 26px;
            font-weight: 900;
            color: var(--swiggy-orange);
            letter-spacing: -1.5px;
        }

        .location-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .location-bold {
            font-weight: 700;
            border-bottom: 2px solid var(--text-dark);
            padding-bottom: 2px;
        }

        .location-gray {
            color: var(--text-gray);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 40px;
            font-weight: 600;
            font-size: 16px;
        }

        .nav-item {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-item:hover {
            color: var(--swiggy-orange);
        }

        /* Main App Container */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Restaurant Hero Banner Section */
        .restaurant-summary {
            padding: 24px 0;
            border-bottom: 1px dashed var(--border-color);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .res-name { font-size: 32px; font-weight: 700; margin: 0 0 8px 0; color: #1c1c1c; }
        .res-cuisines { font-size: 15px; color: var(--text-gray); margin: 0 0 4px 0; }
        .res-locality { font-size: 14px; color: var(--text-gray); margin: 0; }

        .res-rating-box {
            border: 1px solid var(--border-color);
            box-shadow: 0 1px 5px rgba(0,0,0,0.05);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            font-weight: 700;
        }

        .rating-green { color: #48c479; font-size: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; margin-bottom: 6px; }
        .total-ratings { font-size: 11px; color: var(--text-gray); font-weight: 600; }

        /* Delivery Metas Row */
        .delivery-meta {
            display: flex;
            gap: 24px;
            font-weight: 700;
            font-size: 15px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        /* Split Page Workspace Layout */
        .split-layout {
            display: grid;
            grid-template-columns: 2.2fr 1.2fr;
            gap: 40px;
        }

        /* Filter Controls */
        .filter-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-gray);
        }

        .filter-btn.active {
            border-color: var(--text-dark);
            color: var(--text-dark);
            background: var(--bg-light);
        }

        /* Menu List Management Components */
        .category-block {
            margin-bottom: 30px;
        }

        .category-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .item-details { flex: 1; padding-right: 30px; }
        
        /* Food Preference Badges */
        .badge {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
        }
        .badge-veg { border: 1px solid var(--veg-green); }
        .badge-veg::after { content: ''; width: 7px; height: 7px; background: var(--veg-green); border-radius: 50%; }
        .badge-nonveg { border: 1px solid var(--nonveg-red); }
        .badge-nonveg::after { content: ''; width: 7px; height: 7px; background: var(--nonveg-red); border-radius: 50%; }

        .item-title { font-size: 18px; font-weight: 600; margin: 0 0 4px 0; }
        .item-cost { font-weight: 600; font-size: 15px; margin: 0 0 10px 0; }
        .item-description { font-size: 14px; color: var(--text-gray); margin: 0; line-height: 1.4; }

        .item-action-wrapper {
            position: relative;
            text-align: center;
            width: 120px;
        }

        .item-placeholder-img {
            width: 118px;
            height: 118px;
            border-radius: 12px;
            object-fit: cover;
            background: #f9f9f9;
            border: 1px solid var(--border-color);
        }

        /* Advanced Plus Minus Adder Button Group */
        .add-action-container {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 36px;
            background: #fff;
            border: 1px solid var(--border-color);
            box-shadow: 0 3px 8px rgba(0,0,0,0.12);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 700;
            color: var(--veg-green);
            overflow: hidden;
            font-size: 14px;
        }

        .add-label-btn {
            width: 100%;
            height: 100%;
            background: none;
            border: none;
            color: var(--veg-green);
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
        }

        .quantity-control-btn {
            width: 30px;
            height: 100%;
            background: none;
            border: none;
            color: #282c3f;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Swiggy High-Fidelity Cart Window Block */
        .checkout-cart-panel {
            border: 1px solid var(--border-color);
            background: #fff;
            padding: 24px;
            height: fit-content;
            position: sticky;
            top: 110px;
            box-shadow: 0 4px 20px rgba(40,44,63,0.05);
        }

        .cart-header-title { font-size: 22px; font-weight: 700; margin: 0 0 4px 0; }
        .cart-res-sub { font-size: 13px; color: var(--text-gray); margin: 0 0 20px 0; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        
        .cart-items-scrollbox { max-height: 300px; overflow-y: auto; margin-bottom: 20px; }
        
        .cart-item-row {
            display: grid;
            grid-template-columns: 1.2fr 1fr 0.6fr;
            align-items: center;
            font-size: 14px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .mini-qty-box {
            display: flex;
            align-items: center;
            border: 1px solid #bebfc5;
            width: 70px;
            justify-content: space-between;
            padding: 2px 6px;
            font-size: 12px;
        }
        .mini-qty-box span { cursor: pointer; color: var(--text-dark); font-weight: 800; }

        .bill-calculation-table {
            border-top: 2px solid var(--text-dark);
            padding-top: 15px;
            font-size: 14px;
            color: #686b78;
        }

        .bill-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .bill-total-bold { font-size: 16px; font-weight: 700; color: var(--text-dark); border-top: 1px solid var(--border-color); padding-top: 14px; margin-top: 10px; }

        .btn-swiggy-pay {
            width: 100%;
            background-color: var(--swiggy-orange);
            color: #fff;
            font-weight: 700;
            border: none;
            padding: 14px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: box-shadow 0.2s;
        }
        .btn-swiggy-pay:hover { box-shadow: 0 4px 14px rgba(252,128,25,0.4); }

        /* Global Status Tracking Canvas Modal */
        .live-tracker-overlay {
            display: none;
